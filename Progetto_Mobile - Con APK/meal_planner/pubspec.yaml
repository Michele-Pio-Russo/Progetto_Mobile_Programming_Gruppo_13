name: meal_planner
description: Meal Planner & Smart Pantry App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  fl_chart: ^0.66.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3   

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

  # Icona diversa per Android/iOS
  # image_path_android: "assets/icon/icon_android.png"
  # image_path_ios: "assets/icon/icon_ios.png"

  # Sfondo per icone adaptive (Android 8+)
  # adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_foreground: "assets/icon/icon_foreground.png"

  # Rimuove lo sfondo su iOS (icona trasparente)
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:                           
    - assets/icon/